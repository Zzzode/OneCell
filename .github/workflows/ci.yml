name: CI

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm run format:check

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build nanoclaw dist (test placeholder)
        run: |
          mkdir -p packages/nanoclaw/dist
          touch packages/nanoclaw/dist/edge-runner-cli.js

      - name: Test nanoclaw
        run: pnpm --filter @onecell/nanoclaw run test
